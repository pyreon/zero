name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          direct_prompt: |
            Review this PR focusing on:
            1. Correctness — logic bugs, edge cases, off-by-one errors
            2. Security — XSS, injection, unsafe patterns, secrets exposure
            3. Performance — unnecessary re-renders, missing memoization, bundle size impact
            4. Types — proper TypeScript usage, missing types, unsafe casts
            5. API design — consistency with existing patterns in the codebase

            Be concise. Only flag real issues, not style preferences.
            Reference specific files and lines.
            If everything looks good, say so briefly.
